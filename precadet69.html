<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Flex Message Ready</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #eef2ff;
        }
        .msg {
            display: none;
            padding: 20px 30px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            font-size: 18px;
            text-align: center;
            color: #333;
        }
        #errorMsg { 
            color: #d9534f;
            word-break: break-word;
            max-width: 80vw;
        }
    </style>
</head>
<body>
    <div class="msg" id="loadingMsg">⏳ กำลังเตรียมการแชร์...</div>
    <div class="msg" id="successMsg">✅ แชร์ให้เพื่อน ๆ สำเร็จแล้ว</div>
    <div class="msg" id="errorMsg">❌ เกิดข้อผิดพลาดในการแชร์</div> 

    <script>
        // กำหนด Flex Message
        const flexMessage = {
            type: "flex",
            altText: "ประชาสัมพันธ์!! การทำสัญญาออนไลน์เข้าเป็น นตท.",
            contents: {
                "type": "bubble",
                "size": "giga",
                "body": {
                    "type": "box",
                    "layout": "horizontal",
                    "contents": [
                        {
                            "type": "image",
                            "url": "https://img1.pic.in.th/images/-.-2.png",
                            "size": "full",
                            "aspectMode": "cover",
                            "aspectRatio": "300:424",
                            "align": "center"
                        },
                        {
                            "type": "button",
                            "action": {
                                "type": "uri",
                                "label": " ",
                                "uri": "https://canva.link/gotobannaafaps69"
                            },
                            "position": "absolute",
                            "offsetTop": "27%",
                            "offsetStart": "7%",
                            "offsetBottom": "49%",
                            "offsetEnd": "66%"
                        },
                        {
                            "type": "button",
                            "action": {
                                "type": "uri",
                                "label": " ",
                                "uri": "https://drive.google.com/file/d/1hwRp9SOclYfxnxoPG1CAPHjpyzC_V1CH/view?usp=drive_link"
                            },
                            "position": "absolute",
                            "offsetTop": "27%",
                            "offsetStart": "37%",
                            "offsetBottom": "49%",
                            "offsetEnd": "36%"
                        },
                        {
                            "type": "button",
                            "action": {
                                "type": "uri",
                                "label": " ",
                                "uri": "https://drive.google.com/file/d/1p5CUI80N0KAiEVEuyZrkyeO3d9GrE6zM/view?usp=sharing"
                            },
                            "position": "absolute",
                            "offsetTop": "27%",
                            "offsetStart": "66%",
                            "offsetBottom": "49%",
                            "offsetEnd": "7%"
                        },
                        {
                            "type": "button",
                            "action": {
                                "type": "uri",
                                "label": " ",
                                "uri": "https://www.afapsschool.com/af69/index_register69?groupkey=1"
                            },
                            "position": "absolute",
                            "offsetTop": "56%",
                            "offsetStart": "7%",
                            "offsetBottom": "27%",
                            "offsetEnd": "66%"
                        },
                        {
                            "type": "button",
                            "action": {
                                "type": "uri",
                                "label": " ",
                                "uri": "https://www.afapsschool.com/af69/index_register69?groupkey=2"
                            },
                            "position": "absolute",
                            "offsetTop": "56%",
                            "offsetStart": "37%",
                            "offsetBottom": "27%",
                            "offsetEnd": "37%"
                        },
                        {
                            "type": "button",
                            "action": {
                                "type": "uri",
                                "label": " ",
                                "uri": "https://www.afapsschool.com/af69/index_register69?groupkey=3"
                            },
                            "position": "absolute",
                            "offsetTop": "70%",
                            "offsetStart": "7%",
                            "offsetBottom": "13%",
                            "offsetEnd": "66%"
                        },
                        {
                            "type": "button",
                            "action": {
                                "type": "uri",
                                "label": " ",
                                "uri": "https://www.afapsschool.com/af69/index_register69?groupkey=4"
                            },
                            "position": "absolute",
                            "offsetTop": "70%",
                            "offsetStart": "37%",
                            "offsetBottom": "13%",
                            "offsetEnd": "37%"
                        },
                        {
                            "type": "button",
                            "action": {
                                "type": "uri",
                                "label": " ",
                                "uri": "https://www.afapsschool.com/af69/go2school"
                            },
                            "position": "absolute",
                            "offsetTop": "56%",
                            "offsetStart": "66%",
                            "offsetBottom": "13%",
                            "offsetEnd": "7%"
                        },
                        {
                            "type": "button",
                            "action": {
                                "type": "uri",
                                "label": " ",
                                "uri": "https://liff.line.me/2007236505-SJlLpqIz"
                            },
                            "position": "absolute",
                            "offsetTop": "87%",
                            "offsetStart": "20%",
                            "offsetBottom": "3%",
                            "offsetEnd": "20%"
                        }
                    ],
                    "paddingAll": "0%"
                }
            }
        };

        function displayMessage(id) {
            document.querySelectorAll('.msg').forEach(el => el.style.display = 'none');
            const target = document.getElementById(id);
            if(target) target.style.display = 'block';
        }

        async function main() {
            try {
                // 1. Initial LIFF
                await liff.init({ liffId: "2007236505-SJlLpqIz" }); 

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                displayMessage('loadingMsg');
                
                // 2. Check API Availability
                if (!liff.isApiAvailable("shareTargetPicker")) {
                    throw new Error("เครื่องนี้ไม่รองรับการแชร์ (โปรดเปิดผ่านแอป LINE บนมือถือ)");
                }

                // 3. Open Share Target Picker
                // ใส่ flexMessage ไว้ใน Array [flexMessage]
                const result = await liff.shareTargetPicker([flexMessage]);
                
                if (result) {
                    displayMessage('successMsg');
                    setTimeout(() => liff.closeWindow(), 2000);
                } else {
                    // กรณีผู้ใช้กด Cancel
                    liff.closeWindow();
                }

            } catch (err) {
                console.error("Share Error:", err);
                const errorMsgElement = document.getElementById('errorMsg');
                errorMsgElement.innerHTML = `❌ เกิดข้อผิดพลาด: <br> ${err.message || 'ไม่ทราบสาเหตุ'}`;
                displayMessage('errorMsg'); 
                // ไม่ต้องรีบปิดเพื่อให้ผู้ใช้อ่าน Error
            }
        }

        main();
    </script>
</body>
</html>
