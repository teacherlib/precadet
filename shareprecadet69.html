<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังแชร์ข้อมูล...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Kanit', sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .loader-container { text-align: center; }
        .line-icon {
            width: 70px;
            height: 70px;
            fill: #00C300;
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
        }
        .message {
            font-size: 20px;
            font-weight: 500;
            color: #00C300;
            margin-bottom: 15px;
        }
        .dot {
            width: 10px; height: 10px; background-color: #00C300;
            border-radius: 50%; display: inline-block;
            animation: pulse 1.4s infinite ease-in-out both;
        }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pulse { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body>

    <div class="loader-container">
        <svg class="line-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.122.303.079.778.039 1.085l-.171 1.027c-.053.303-.242 1.186 1.039.647 1.281-.54 6.911-4.069 9.428-6.967 1.739-1.907 2.572-4.116 2.572-5.992z"/>
        </svg>
        <div class="message">กำลังแชร์ข้อมูลให้เพื่อนทางไลน์</div>
        <div class="dot"></div> <div class="dot" style="animation-delay: 0.2s"></div> <div class="dot" style="animation-delay: 0.4s"></div>
    </div>

    <script>
        async function initializeLiff() {
            try {
                // เปลี่ยน '2007236505-SJlLpqIz' เป็นเฉพาะตัวเลขด้านหน้า (ID) หากโค้ดมีปัญหา
                // แต่ปกติใส่แบบเต็มได้ครับ
                await liff.init({ liffId: "2007236505-SJlLpqIz" });

                if (liff.isInClient()) {
                    // ถ้าเปิดใน LINE ให้สั่งเปิดหน้าเดิมด้วยคำสั่งภายใน
                    window.location.href = "https://liff.line.me/2007236505-SJlLpqIz";
                } else {
                    // ถ้าอยู่นอก LINE ให้พยายามบังคับเข้าแอป (แต่ส่วนใหญ่จะเปิด Browser)
                    window.location.replace("https://liff.line.me/2007236505-SJlLpqIz");
                }
            } catch (err) {
                // กรณีโหลด SDK ไม่สำเร็จ ให้ใช้ redirect ปกติ
                window.location.href = "https://liff.line.me/2007236505-SJlLpqIz";
            }
        }

        // เริ่มการทำงานทันที
        initializeLiff();
    </script>
</body>
</html>
