<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังแชร์ข้อมูล...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Kanit', sans-serif;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .loader-container { text-align: center; animation: fadeIn 0.8s ease-out; }
        .line-icon {
            width: 70px;
            height: 70px;
            fill: #00C300;
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
        }
        .message {
            font-size: 20px;
            font-weight: 500;
            color: #00C300;
            margin-bottom: 15px;
        }
        .dots { display: flex; justify-content: center; gap: 8px; }
        .dot {
            width: 10px;
            height: 10px;
            background-color: #00C300;
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes pulse { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }
    </style>

    <script>
        function redirect() {
            const liffUrl = "https://liff.line.me/2007236505-SJlLpqIz";
            
            // ตรวจสอบว่าเป็น Browser ใน LINE หรือไม่
            const isLine = /Line/i.test(navigator.userAgent);

            if (isLine) {
                // หากเปิดใน LINE ให้ใช้คำสั่งเปลี่ยนหน้าภายในทันที
                window.location.href = liffUrl;
            } else {
                // หากเปิดนอก LINE ให้ใช้ replace เพื่อไม่ให้กด back กลับมาได้
                window.location.replace(liffUrl);
            }
        }

        // ตั้งเวลาให้แสดงแอนิเมชันแป๊บเดียว (1 วินาที) แล้วไปต่อ
        setTimeout(redirect, 1000);
    </script>
</head>
<body>

    <div class="loader-container">
        <svg class="line-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.122.303.079.778.039 1.085l-.171 1.027c-.053.303-.242 1.186 1.039.647 1.281-.54 6.911-4.069 9.428-6.967 1.739-1.907 2.572-4.116 2.572-5.992z"/>
        </svg>
        <div class="message">กำลังแชร์ข้อมูลให้เพื่อนทางไลน์</div>
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

</body>
</html>
