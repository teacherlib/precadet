<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังแชร์ข้อมูล...</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #f0fdf4, #ffffff); /* พื้นหลังไล่สีโทนเขียวอ่อน-ขาว */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            overflow: hidden;
        }
        .loader-container {
            text-align: center;
            background: #ffffff;
            padding: 50px 60px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0, 195, 0, 0.08); /* เงาสีเขียวอ่อน */
            animation: fadeIn 0.8s ease-out;
        }
        /* ไอคอน LINE SVG */
        .line-icon {
            width: 80px;
            height: 80px;
            fill: #00C300; /* สีเขียวเอกลักษณ์ของ LINE */
            margin-bottom: 20px;
            animation: bounce 2s infinite ease-in-out;
        }
        .message {
            font-size: 22px;
            font-weight: 500;
            color: #00C300;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
        /* จุดไข่ปลาโหลดดิ้ง (Loading Dots) */
        .dots {
            display: flex;
            justify-content: center;
            gap: 8px;
        }
        .dot {
            width: 12px;
            height: 12px;
            background-color: #00C300;
            border-radius: 50%;
            animation: pulse 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        
        /* สร้างแอนิเมชันให้ดูมีมิติ */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes pulse {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>

    <script>
        // ใช้ JavaScript เพื่อเปลี่ยนหน้าอัตโนมัติ
        // เลข 1500 คือระยะเวลาที่แสดงหน้าจอนี้ (1.5 วินาที) ก่อนเด้งไปหน้า LINE LIFF
        // หากต้องการให้เด้งทันทีโดยไม่ให้เห็นหน้านี้เลย ให้เปลี่ยนเป็น 0 ครับ
        setTimeout(function() {
            window.location.replace("https://liff.line.me/2007236505-SJlLpqIz");
        }, 1500); 
    </script>
</head>
<body>

    <div class="loader-container">
        <svg class="line-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 10.304c0-5.369-5.383-9.738-12-9.738-6.616 0-12 4.369-12 9.738 0 4.814 4.269 8.846 10.036 9.608.391.084.922.258 1.057.592.122.303.079.778.039 1.085l-.171 1.027c-.053.303-.242 1.186 1.039.647 1.281-.54 6.911-4.069 9.428-6.967 1.739-1.907 2.572-4.116 2.572-5.992z"/>
        </svg>
        
        <div class="message">กำลังแชร์ข้อมูลให้เพื่อนทางไลน์</div>
        
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

</body>
</html>
